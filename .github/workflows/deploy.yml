name: Deploy Repayment Calendar Worker

# 触发条件
on:
  # 1) 推送到 main 分支，且改动涉及源码或配置时自动部署
  push:
    branches:
      - main
    paths:
      - 'src/**'           # 通配整个 src 目录：以后往 holidays/ 加新国家文件也无需改这里
      - 'wrangler.toml'
  # 2) 手动触发按钮 (Actions 页面点 "Run workflow")
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 发布 Worker 到 Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: '4'
          # 入口、名称、兼容性日期都已写在 wrangler.toml 里，这里直接 deploy 即可
          command: deploy
